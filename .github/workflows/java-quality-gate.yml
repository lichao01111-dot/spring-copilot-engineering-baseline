name: Java 质量门禁模板
# 填写 .baseline/project-profile.yaml 中真实 JDK 和构建命令后再启用。
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  BASELINE_JAVA_VERSION: "21"
  PERFORMANCE_RISK_MODE: strict
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.BASELINE_JAVA_VERSION }}
      - name: 校验基线并编译项目
        run: scripts/verify.sh
      - name: 运行项目测试
        run: scripts/test.sh
